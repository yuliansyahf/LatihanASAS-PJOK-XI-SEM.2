<!DOCTYPE html>
<html lang="id">
<head>

    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 10px -4px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            position: sticky;
            top: 12px;
            z-index: 100;
        }
        header h1 {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        header .subtitle {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .category-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .cat-btn {
            padding: 10px 16px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            color: var(--text);
            letter-spacing: 0.01em;
        }
        .cat-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        .cat-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            min-height: 400px;
            transition: var(--transition);
        }
        .progress-bar-wrap {
            background: #e5e7eb;
            border-radius: 50px;
            height: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 50px;
            transition: width 0.4s ease;
        }
        .question-num {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: #f8fafc;
            cursor: pointer;
            font-size: 0.95rem;
            transition: var(--transition);
            text-align: left;
            font-weight: 500;
            color: var(--text);
            position: relative;
        }
        .option-btn:hover {
            border-color: #93c5fd;
            background: #eff6ff;
            transform: translateX(3px);
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: #dbeafe;
            font-weight: 700;
        }
        .option-btn.correct {
            border-color: var(--success) !important;
            background: #dcfce7 !important;
            color: #15803d !important;
            font-weight: 700;
            animation: pulse-green 0.5s ease;
        }
        .option-btn.incorrect {
            border-color: var(--danger) !important;
            background: #fef2f2 !important;
            color: #b91c1c !important;
            font-weight: 700;
            animation: shake 0.4s ease;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }
        .option-letter {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .option-btn.selected .option-letter {
            background: var(--primary);
            color: #fff;
        }
        .option-btn.correct .option-letter {
            background: var(--success);
            color: #fff;
        }
        .option-btn.incorrect .option-letter {
            background: var(--danger);
            color: #fff;
        }
        @keyframes pulse-green {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }
        .feedback {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .feedback.show {
            display: block;
        }
        .feedback.correct-fb {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #86efac;
        }
        .feedback.incorrect-fb {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.01em;
        }
        .btn-prev {
            background: #e2e8f0;
            color: var(--text);
        }
        .btn-prev:hover {
            background: #cbd5e1;
        }
        .btn-next {
            background: var(--primary);
            color: #fff;
        }
        .btn-next:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .btn-reset {
            background: #fff;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .btn-reset:hover {
            background: #fef2f2;
        }
        .score-display {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .score-chip {
            padding: 8px 16px;
            border-radius: 50px;
            background: #f1f5f9;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .score-chip .emoji {
            font-size: 1.2rem;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .summary-item {
            text-align: center;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: #f8fafc;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            font-weight: 600;
        }
        .summary-item:hover {
            background: #eff6ff;
            border-color: var(--primary);
        }
        .summary-item .num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }
        .summary-item.done {
            background: #dcfce7;
            border-color: #86efac;
        }
        .summary-item.done .num {
            color: #15803d;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            .container {
                padding: 8px;
            }
            .main-card {
                padding: 16px;
                border-radius: var(--radius-sm);
            }
            .cat-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            .option-btn {
                padding: 12px 14px;
                font-size: 0.85rem;
                gap: 8px;
            }
            .option-letter {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .nav-btn {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

                                'Kehamilan, persalinan, dan menyusui', 'Sentuhan kulit', 'Pelukan'
                            ], a: 2 },
                        { q: 'Tujuan utama pengobatan ARV adalah...', o: ['Membunuh HIV', 'Menyembuhkan HIV',
                                'Menekan jumlah virus agar tidak merusak imun', 'Menghilangkan gejala demam',
                                'Mencegah batuk'
                            ], a: 2 },
                        { q: 'Alat berikut berpotensi menularkan HIV bila dipakai bersama, kecuali...', o: [
                                'Jarum suntik', 'Jarum tato', 'Pisau cukur', 'Sisir', 'Alat tindik'
                            ], a: 3 },
                        { q: 'Tahap akhir infeksi HIV disebut...', o: ['Window period', 'Serokonversi', 'AIDS',
                                'Stadium awal', 'Stadium bebas'
                            ], a: 2 },
                        { q: 'HIV tidak dapat bertahan hidup di...', o: ['Darah', 'Cairan tubuh', 'Jarum suntik',
                                'Lingkungan terbuka', 'Benda tajam'
                            ], a: 3 },
                        { q: 'Seseorang disebut ODHA berarti...', o: ['Orang Dengan Hepatitis A',
                                'Orang Dengan HIV/AIDS', 'Orang Dermawan HIV', 'Orang Dalam Hidup Aman',
                                'Orang Dalam Hati Aman'
                            ], a: 1 },
                        { q: 'Salah satu faktor yang mempercepat perkembangan HIV menjadi AIDS adalah...', o: [
                                'Pola makan sehat', 'Stres berat', 'Olahraga teratur', 'Istirahat cukup',
                            'Hidup bersih'], a: 1 },
                        { q: 'Pada penderita AIDS, risiko infeksi meningkat karena...', o: ['Virus berhenti bekerja',
                                'Sistem imun rusak', 'Virus menjadi kebal', 'Tubuh menghasilkan lebih banyak antibodi',
                                'Tubuh menolak virus'
                            ], a: 1 },
                        { q: 'HIV tidak dapat menular melalui gigitan...', o: ['Nyamuk', 'Jarum suntik', 'Tato',
                                'Transfusi darah', 'Seks bebas'
                            ], a: 0 },
                        { q: 'Seseorang dapat terinfeksi HIV jika melakukan hubungan seksual tanpa...', o: [
                                'Makan bersama', 'Kondom', 'Minum air putih', 'Cuci tangan', 'Pakaian tebal'
                            ], a: 1 },
                        { q: 'Untuk mencegah transmisi HIV pada tenaga medis digunakan...', o: ['Masker kain',
                                'Pelindung wajah dan sarung tangan', 'Topi', 'Rompi', 'Sabuk'
                            ], a: 1 },
                        { q: 'HIV menyerang sel darah putih jenis...', o: ['Eritrosit', 'Trombosit', 'Leukosit CD4',
                                'Hemoglobin', 'Plasma'
                            ], a: 2 },
                        { q: 'Transfusi darah aman dilakukan jika...', o: ['Darah tidak diperiksa',
                                'Darah dari donor yang tidak dikenal', 'Darah sudah melalui tes HIV',
                                'Darah dari teman saja', 'Darah langsung diambil'
                            ], a: 2 },
                        { q: 'Upaya pemerintah mencegah HIV melalui program...', o: ['Konseling dan tes HIV',
                                'Pemberian antibiotik', 'Program diet sehat', 'Penyemprotan udara',
                            'Pemberian vaksin flu'], a: 0 },
                        { q: 'Salah satu tanda infeksi oportunistik pada AIDS adalah...', o: ['Berat badan stabil',
                                'Sering berkeringat malam', 'Nafsu makan meningkat', 'Kulit mengering',
                            'Rambut tumbuh cepat'
                            ], a: 1 }
                    ]
                }
            };

            // ──────────────────────────────────────────────
            // STATE
            // ──────────────────────────────────────────────
            const categories = Object.keys(quizData);
            let currentCategory = categories[0];
            let currentIndex = 0;
            // userAnswers: { [category]: { [questionIndex]: selectedOptionIndex } }
            let userAnswers = {};
            categories.forEach(cat => { userAnswers[cat] = {}; });

            // ──────────────────────────────────────────────
            // DOM REFS
            // ──────────────────────────────────────────────
            const categorySelector = document.getElementById('categorySelector');
            const mainCard = document.getElementById('mainCard');
            const progressBar = document.getElementById('progressBar');
            const questionNum = document.getElementById('questionNum');
            const questionText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const feedback = document.getElementById('feedback');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const navButtons = document.getElementById('navButtons');
            const summaryGrid = document.getElementById('summaryGrid');

            // ──────────────────────────────────────────────
            // RENDER CATEGORY BUTTONS
            // ──────────────────────────────────────────────
            function renderCategoryButtons() {
                categorySelector.innerHTML = '';
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
                    btn.textContent = quizData[cat].icon + ' ' + cat;
                    btn.addEventListener('click', () => {
                        currentCategory = cat;
                        currentIndex = 0;
                        renderAll();
                    });
                    categorySelector.appendChild(btn);
                });
            }

            // ──────────────────────────────────────────────
            // SCORE CALCULATION
            // ──────────────────────────────────────────────
            function getScoreForCategory(cat) {
                const questions = quizData[cat].questions;
                let correct = 0;
                questions.forEach((q, i) => {
                    if (userAnswers[cat][i] !== undefined && userAnswers[cat][i] === q.a) correct++;
                });
                return { correct, total: questions.length };
            }

            function getTotalScore() {
                let correct = 0,
                    total = 0;
                categories.forEach(cat => {
                    const s = getScoreForCategory(cat);
                    correct += s.correct;
                    total += s.total;
                });
                return { correct, total };
            }

            // ──────────────────────────────────────────────
            // RENDER ALL
            // ──────────────────────────────────────────────
            function renderAll() {
                renderCategoryButtons();
                renderQuestion();
                renderSummary();
                window.scrollTo({ top: mainCard.offsetTop - 100, behavior: 'smooth' });
            }

            function renderQuestion() {
                const questions = quizData[currentCategory].questions;
                const q = questions[currentIndex];
                const total = questions.length;
                const answered = userAnswers[currentCategory][currentIndex];
                const isAnswered = answered !== undefined;
                const isCorrect = isAnswered && answered === q.a;

                // Progress bar
                const answeredCount = Object.keys(userAnswers[currentCategory]).filter(k => userAnswers[
                    currentCategory][k] !== undefined).length;
                progressBar.style.width = ((answeredCount / total) * 100) + '%';

                // Question num & text
                questionNum.textContent =
                    `📂 ${currentCategory} • Soal ${currentIndex + 1} dari ${total} • ${quizData[currentCategory].icon}`;
                questionText.textContent = q.q;

                // Options
                const letters = ['A', 'B', 'C', 'D', 'E'];
                optionsContainer.innerHTML = '';
                q.o.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    if (isAnswered && idx === q.a) btn.classList.add('correct');
                    if (isAnswered && idx === answered && idx !== q.a) btn.classList.add('incorrect');
                    if (!isAnswered) btn.classList.add('clickable');
                    btn.disabled = isAnswered;
                    btn.innerHTML = `<span class="option-letter">${letters[idx]}</span> ${opt}`;
                    if (!isAnswered) {
                        btn.addEventListener('click', () => selectAnswer(idx));
                    }
                    optionsContainer.appendChild(btn);
                });

                // Feedback
                feedback.className = 'feedback';
                feedback.classList.remove('show', 'correct-fb', 'incorrect-fb');
                if (isAnswered) {
                    feedback.classList.add('show');
                    if (isCorrect) {
                        feedback.classList.add('correct-fb');
                        feedback.textContent = '✅ Benar! Jawaban kamu tepat.';
                    } else {
                        feedback.classList.add('incorrect-fb');
                        feedback.textContent = `❌ Salah. Jawaban yang benar adalah ${letters[q.a]}. ${q.o[q.a]}`;
                    }
                }

                // Score display
                const sc = getScoreForCategory(currentCategory);
                scoreDisplay.innerHTML = `
                    <span class="score-chip"><span class="emoji">✅</span> Benar: ${sc.correct}</span>
                    <span class="score-chip"><span class="emoji">❌</span> Salah: ${sc.total - sc.correct - (isAnswered ? 0 : Object.keys(userAnswers[currentCategory]).filter(k=>userAnswers[currentCategory][k]!==undefined).length - sc.correct)}</span>
                    <span class="score-chip"><span class="emoji">📝</span> Terjawab: ${Object.keys(userAnswers[currentCategory]).filter(k=>userAnswers[currentCategory][k]!==undefined).length}/${sc.total}</span>
                    <span class="score-chip"><span class="emoji">⭐</span> Skor: ${sc.total > 0 ? Math.round((sc.correct/sc.total)*100) : 0}%</span>
                `;

                // Refresh score display properly
                const ansCount = Object.keys(userAnswers[currentCategory]).filter(k => userAnswers[currentCategory][
                    k
                ] !== undefined).length;
                scoreDisplay.innerHTML = `
                    <span class="score-chip"><span class="emoji">✅</span> Benar: ${sc.correct}</span>
                    <span class="score-chip"><span class="emoji">❌</span> Salah: ${ansCount - sc.correct}</span>
                    <span class="score-chip"><span class="emoji">📝</span> Terjawab: ${ansCount}/${sc.total}</span>
                    <span class="score-chip"><span class="emoji">⭐</span> Skor: ${sc.total > 0 ? Math.round((sc.correct/sc.total)*100) : 0}%</span>
                `;

                // Nav buttons
                navButtons.innerHTML = '';
                if (currentIndex > 0) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'nav-btn btn-prev';
                    prevBtn.textContent = '⬅ Sebelumnya';
                    prevBtn.addEventListener('click', () => { currentIndex--;
                        renderAll(); });
                    navButtons.appendChild(prevBtn);
                }
                if (currentIndex < total - 1) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'nav-btn btn-next';
                    nextBtn.textContent = 'Selanjutnya ➡';
                    nextBtn.addEventListener('click', () => { currentIndex++;
                        renderAll(); });
                    navButtons.appendChild(nextBtn);
                }
                const resetBtn = document.createElement('button');
                resetBtn.className = 'nav-btn btn-reset';
                resetBtn.textContent = '🔄 Ulangi Kategori';
                resetBtn.addEventListener('click', () => {
                    if (confirm('Reset semua jawaban untuk kategori "' + currentCategory + '"?')) {
                        userAnswers[currentCategory] = {};
                        currentIndex = 0;
                        renderAll();
                    }
                });
                navButtons.appendChild(resetBtn);

                if (isAnswered && currentIndex < total - 1) {
                    const autoNext = document.createElement('button');
                    autoNext.className = 'nav-btn btn-next';
                    autoNext.textContent = 'Lanjut ➡';
                    autoNext.style.marginLeft = '8px';
                    autoNext.addEventListener('click', () => { currentIndex++;
                        renderAll(); });
                    navButtons.appendChild(autoNext);
                }
            }

            function selectAnswer(idx) {
                userAnswers[currentCategory][currentIndex] = idx;
                renderAll();
            }

            function renderSummary() {
                summaryGrid.innerHTML = '<strong style="grid-column:1/-1;text-align:center;margin-bottom:4px;">📊 Ringkasan Semua Kategori</strong>';
                categories.forEach(cat => {
                    const sc = getScoreForCategory(cat);
                    const totalQ = sc.total;
                    const answeredCount = Object.keys(userAnswers[cat]).filter(k => userAnswers[cat][k] !==
                        undefined).length;
                    const done = answeredCount === totalQ && totalQ > 0;
                    const div = document.createElement('div');
                    div.className = 'summary-item' + (done ? ' done' : '');
                    div.innerHTML =
                        `<span>${quizData[cat].icon}</span><br><span style="font-weight:700">${cat}</span><br><span class="num">${answeredCount}/${totalQ}</span><br><small>⭐ ${totalQ>0?Math.round((sc.correct/totalQ)*100):0}%</small>`;
                    div.addEventListener('click', () => {
                        currentCategory = cat;
                        currentIndex = 0;
                        renderAll();
                    });
                    summaryGrid.appendChild(div);
                });
                const totalSc = getTotalScore();
                const totalDiv = document.createElement('div');
                totalDiv.className = 'summary-item';
                totalDiv.style.background = '#eff6ff';
                totalDiv.style.borderColor = '#93c5fd';
                totalDiv.innerHTML =
                    `<span>🏆</span><br><span style="font-weight:700">TOTAL</span><br><span class="num">${totalSc.correct}/${totalSc.total}</span><br><small>⭐ ${totalSc.total>0?Math.round((totalSc.correct/totalSc.total)*100):0}%</small>`;
                summaryGrid.appendChild(totalDiv);
            }

            // ──────────────────────────────────────────────
            // INIT
            // ──────────────────────────────────────────────
            renderAll();

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                const total = quizData[currentCategory].questions.length;
                if (e.key === 'ArrowRight' && currentIndex < total - 1) {
                    e.preventDefault();
                    currentIndex++;
                    renderAll();
                } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                    e.preventDefault();
                    currentIndex--;
                    renderAll();
                } else if (e.key >= '1' && e.key <= '5') {
                    const idx = parseInt(e.key) - 1;
                    const questions = quizData[currentCategory].questions;
                    if (idx < questions[currentIndex].o.length && userAnswers[currentCategory][currentIndex] ===
                        undefined) {
                        e.preventDefault();
                        selectAnswer(idx);
                    }
                }
            });
        })();
    </script>
</body>
</html>
