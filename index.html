
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quizizz Style | Latihan Soal Interaktif</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts (Poppins) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #1e1e1e 0%, #1e1e1e 100%); background-attachment: fixed; }
      
        .quiz-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.25);
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .option-btn:active {
            transform: scale(0.96);
        }
        .fade-scale {
            animation: fadeScale 0.2s ease-out;
        }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .progress-bar-fill {
            transition: width 0.4s ease;
        }
        .score-badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
        }
        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- Header dengan animasi -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-md px-5 py-2 rounded-full text-white text-sm font-semibold shadow-lg mb-5">
                <i class="fas fa-bolt"></i>
                <span>FAD SEMANGAT ASAS!!</span>
            </div>
            <h1 class="text-5xl md:text-6xl font-extrabold text-white tracking-tight br-1">🎯 LATIHAN ASAS PJOK SEM.2</h1>
        

        <!-- Panel Skor & Progress -->
        <div class="bg-black/70 backdrop-blur-md rounded-2xl p-5 mb-8 my-5 shadow-xl border border-white/20 ">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full w-16 h-16 flex items-center justify-center shadow-lg">
                        <i class="fas fa-trophy text-white text-3xl"></i>
                    </div>
                    <div>
                        <p class="text-white/70 text-sm">Skor Anda</p>
                        <p class="text-white text-4xl font-bold" id="scoreDisplay">0</p>
                    </div>
                </div>
                <div class="flex-1 w-full max-w-md">
                    <div class="flex justify-between text-white text-sm mb-1">
                        <span><i class="fas fa-check-circle"></i> Progres menjawab</span>
                        <span id="progressCount">0 / 0</span>
                    </div>
                    <div class="w-full bg-white/30 rounded-full h-3 overflow-hidden">
                        <div id="progressFill" class="progress-bar-fill bg-gradient-to-r from-green-400 to-emerald-500 h-full rounded-full w-0"></div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="reshuffleBtn" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-xl transition flex items-center gap-2 backdrop-blur-sm font-semibold"><i class="fas fa-random"></i> Acak Soal</button>
                    <button id="resetBtn" class="bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-xl transition flex items-center gap-2 backdrop-blur-sm font-semibold"><i class="fas fa-undo-alt"></i> Reset</button>
                </div>
            </div>
        </div>

        <!-- Container Grid Soal (masonry style responsif) -->
        <div id="quizGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 transition-all"></div>
        
        <!-- Footer -->
        <div class="mt-12 text-center text-white/60 text-sm">
            <i class="fas fa-lightbulb"></i> Beberapa soal sengaja memiliki jawaban SALAH — baca kunci jawaban untuk belajar.
        </div>
    </div>

    <script>
        // ======================== DATABASE SOAL DENGAN VARIASI JAWABAN (BENAR/SALAH) ========================
        // Setiap objek: text, correct (boolean), explanation
        const bankSoal = [
            // KESEHATAN UMUM (14)
            { text: "Vitamin C adalah vitamin yang terdapat pada banyak buah.", correct: true, explanation: "Jeruk, jambu, kiwi, dan stroberi kaya vitamin C." },
            { text: "Makanan tinggi protein hanya berguna untuk menambah lemak tubuh.", correct: false, explanation: "Protein membangun dan memperbaiki jaringan, bukan menambah lemak." },
            { text: "Mengonsumsi makanan terlalu asin dapat menyebabkan tekanan darah tinggi.", correct: true, explanation: "Natrium berlebih memicu hipertensi." },
            { text: "Menggosok gigi dianjurkan cukup seminggu sekali.", correct: false, explanation: "Harus minimal dua kali sehari." },
            { text: "Kebiasaan mencuci sayur sebelum dimasak bertujuan untuk membersihkan kotoran dan pestisida.", correct: true, explanation: "Mencuci sayur menghilangkan residu berbahaya." },
            { text: "Salah satu tanda tubuh kurang istirahat adalah mata terasa berat.", correct: true, explanation: "Mata berat, lelah, dan mengantuk adalah gejala kurang istirahat." },
            { text: "Perilaku Hidup Bersih dan Sehat disingkat PHBS.", correct: true, explanation: "PHBS adalah singkatan yang benar." },
            { text: "Salah satu cara mencegah flu adalah menghindari minum air putih.", correct: false, explanation: "Mencegah flu dengan vitamin C, istirahat, dan hidrasi yang cukup." },
            { text: "Cara menjaga kesehatan mental adalah istirahat cukup dan berinteraksi sosial.", correct: true, explanation: "Istirahat dan sosialisasi baik untuk mental." },
            { text: "Air putih baik diminum minimal 8 gelas per hari.", correct: true, explanation: "Rekomendasi umum 8 gelas sehari." },
            { text: "Kebiasaan duduk terlalu lama dapat menyebabkan risiko penyakit jantung.", correct: true, explanation: "Gaya hidup sedentari meningkatkan risiko kardiovaskular." },
            { text: "Salah satu sumber karbohidrat adalah nasi.", correct: true, explanation: "Nasi kaya karbohidrat." },
            { text: "Contoh makanan berserat tinggi adalah daging sapi.", correct: false, explanation: "Daging sapi rendah serat, contoh serat: pepaya, sayur, buah." },
            { text: "Minum kopi dingin dapat menggantikan kebutuhan air putih harian.", correct: false, explanation: "Air putih tetap utama, kopi bersifat diuretik." },
            // KEBUGARAN JASMANI (20)
            { text: "Lari jarak jauh melatih daya tahan.", correct: true, explanation: "Meningkatkan kapasitas kardiorespirasi." },
            { text: "Sit up dilakukan untuk melatih otot perut.", correct: true, explanation: "Fokus pada rectus abdominis." },
            { text: "Kemampuan bergerak cepat dalam waktu singkat disebut kelincahan.", correct: false, explanation: "Itu adalah kecepatan (speed), kelincahan = agility." },
            { text: "Contoh latihan kekuatan otot lengan adalah dengan pull up.", correct: true, explanation: "Pull up mengandalkan lengan dan punggung." },
            { text: "Faktor yang mempengaruhi kebugaran hanya faktor usia.", correct: false, explanation: "Ada banyak: pola makan, istirahat, genetik, aktivitas." },
            { text: "Latihan yang berguna meningkatkan daya tahan jantung adalah jogging.", correct: true, explanation: "Jogging adalah latihan aerobik." },
            { text: "Senam aerobik termasuk latihan daya tahan.", correct: true, explanation: "Meningkatkan ketahanan kardio." },
            { text: "Tes 12 menit Cooper digunakan untuk mengukur kekuatan otot.", correct: false, explanation: "Mengukur daya tahan kardiorespirasi (jarak lari 12 menit)." },
            { text: "Contoh latihan kelenturan otot punggung adalah back up.", correct: true, explanation: "Back up melenturkan dan menguatkan punggung." },
            { text: "Latihan speed skipping bermanfaat untuk melatih jantung.", correct: true, explanation: "Meningkatkan denyut jantung." },
            { text: "Frekuensi latihan ideal dalam seminggu adalah 3-5 kali.", correct: true, explanation: "Rekomendasi WHO untuk kebugaran." },
            { text: "Push up bermanfaat untuk melatih otot lengan dan dada.", correct: true, explanation: "Melatih dada, trisep, bahu." },
            { text: "Melakukan pendinginan berfungsi untuk menambah massa otot.", correct: false, explanation: "Pendinginan mengurangi cedera & menormalkan detak jantung." },
            { text: "Power adalah gabungan dari kekuatan dan kecepatan.", correct: true, explanation: "Power = strength × speed." },
            { text: "Latihan interval merupakan latihan yang diselingi istirahat.", correct: true, explanation: "Interval training = selingan kerja & istirahat." },
            { text: "Prinsip spesialisasi latihan berarti latihan harus sesuai tujuan.", correct: true, explanation: "Specificity principle." },
            { text: "Jogging sebaiknya dilakukan hanya 5 menit per hari.", correct: false, explanation: "Efektif 20-30 menit untuk manfaat kardio." },
            { text: "Pull up melatih otot lengan dan punggung.", correct: true, explanation: "Melibatkan latissimus dorsi & biseps." },
            { text: "Lari sprint 100 meter termasuk latihan kecepatan.", correct: true, explanation: "Sprint eksplosif melatih kecepatan." },
            { text: "Untuk meningkatkan daya tahan jantung, latihan yang cocok adalah angkat beban maksimal.", correct: false, explanation: "Lebih baik aerobik: renang, jogging, sepeda." },
            // SOFTBALL (23)
            { text: "Softball adalah permainan yang dimainkan oleh 9 pemain.", correct: true, explanation: "Satu tim terdiri dari 9 pemain di lapangan." },
            { text: "Permainan softball berasal dari negara Inggris.", correct: false, explanation: "Berasal dari Amerika Serikat (Chicago, 1887)." },
            { text: "Lapangan softball berbentuk setengah lingkaran atau diamond (infield berbentuk segi empat).", correct: true, explanation: "Bentuk diamond dengan base segi empat." },
            { text: "Jumlah base dalam softball ada 3.", correct: false, explanation: "Ada 4 base (first, second, third, home)." },
            { text: "Bola yang dilemparkan pitcher harus berada di strike zone.", correct: true, explanation: "Strike zone area sah untuk dipukul." },
            { text: "Jika bola dilempar dan tidak sesuai strike zone disebut ball.", correct: true, explanation: "Ball adalah lemparan di luar strike zone." },
            { text: "Jika batter mendapatkan 4 ball, maka ia berhak jalan ke first base.", correct: true, explanation: "Walk / base on balls." },
            { text: "Pergantian regu antara menyerang dan bertahan disebut half inning.", correct: false, explanation: "Disebut inning (atau setengah inning untuk satu sisi)." },
            { text: "Jumlah inning standar dalam softball ada 7.", correct: true, explanation: "Pertandingan softball 7 inning." },
            { text: "Pemain yang menjaga antara second base dan third base adalah short stop.", correct: true, explanation: "Shortstop posisi di area itu." },
            { text: "Peralatan yang wajib digunakan pemain softball adalah sarung tangan (mitt).", correct: true, explanation: "Mitt untuk menangkap bola." },
            { text: "Pukulan yang menyebabkan bola memantul ke tanah disebut fly ball.", correct: false, explanation: "Ground ball, fly ball adalah melambung." },
            { text: "Bola yang melambung tinggi setelah dipukul disebut fly ball.", correct: true, explanation: "Fly ball = bola melambung." },
            { text: "Pukulan lurus dan cepat disebut line drive.", correct: true, explanation: "Line drive pukulan datar cepat." },
            { text: "Pemain yang menjaga base pertama adalah first baseman, pemain yang menjaga base ketiga adalah third baseman.", correct: true, explanation: "Sesuai posisi softball." },
            { text: "Area tempat pemain menunggu giliran memukul disebut bullpen.", correct: false, explanation: "Disebut dugout, bullpen untuk pitcher cadangan." },
            { text: "Pitcher melempar bola dari pitcher's plate.", correct: true, explanation: "Juga disebut rubber." },
            { text: "Istilah double play berarti 2 out dalam satu permainan.", correct: true, explanation: "Dua mati dalam satu rangkaian." },
            { text: "Pemain bertahan yang menangkap bola di udara menyebabkan out.", correct: true, explanation: "Fly out." },
            { text: "Jarak antara pitcher dan home plate adalah sekitar 12–14 meter.", correct: true, explanation: "Jarak resmi ~13,11 meter." },
            { text: "Lapangan softball terdiri dari dua bagian yaitu infield dan outfield.", correct: true, explanation: "Infield dan outfield." },
            { text: "Sarung tangan untuk menangkap bola disebut glove (mitt juga benar).", correct: true, explanation: "Mitt atau glove." },
            { text: "Area lemparan pitcher berbentuk persegi panjang.", correct: false, explanation: "Biasanya lingkaran atau setengah lingkaran." }
        ];

        // Variabel global
        let currentQuestions = [];       // array soal setelah diacak
        let userAnswers = new Map();     // key: index soal, value: true/false (boolean pilihan user)
        let score = 0;
        
        // Elemen DOM
        const gridContainer = document.getElementById('quizGrid');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const progressCountSpan = document.getElementById('progressCount');
        const progressFillDiv = document.getElementById('progressFill');
        const reshuffleBtn = document.getElementById('reshuffleBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // Fungsi mengacak array (Fisher-Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // Inisialisasi / acak ulang soal
        function initRandomQuestions() {
            // Clone bank soal lalu acak
            currentQuestions = shuffleArray([...bankSoal]);
            userAnswers.clear();
            calculateScore();
            renderQuizGrid();
            updateProgressAndScore();
        }
        
        // Hitung skor berdasarkan userAnswers yang tersimpan
        function calculateScore() {
            let newScore = 0;
            for (let i = 0; i < currentQuestions.length; i++) {
                const userAns = userAnswers.get(i);
                if (userAns !== undefined && userAns === currentQuestions[i].correct) {
                    newScore++;
                }
            }
            score = newScore;
            if (scoreDisplay) scoreDisplay.innerText = score;
            return score;
        }
        
        // Update progress bar & teks progres
        function updateProgressAndScore() {
            const total = currentQuestions.length;
            const answered = userAnswers.size;
            if (progressCountSpan) progressCountSpan.innerText = `${answered} / ${total}`;
            const percent = total === 0 ? 0 : (answered / total) * 100;
            if (progressFillDiv) progressFillDiv.style.width = `${percent}%`;
            calculateScore(); // refresh skor tampilan
        }
        
        // Render semua kartu soal (grid)
        function renderQuizGrid() {
            if (!gridContainer) return;
            gridContainer.innerHTML = '';
            if (currentQuestions.length === 0) {
                gridContainer.innerHTML = '<div class="col-span-full text-center text-white text-xl">Memuat soal...</div>';
                return;
            }
            
            currentQuestions.forEach((q, idx) => {
                const userChoice = userAnswers.get(idx); // boolean (true=benar dipilih, false=salah dipilih) atau undefined
                const isAnswered = userChoice !== undefined;
                const isCorrectAnswer = (isAnswered && userChoice === q.correct);
                
                // membuat kartu
                const card = document.createElement('div');
                card.className = 'quiz-card bg-white rounded-2xl overflow-hidden shadow-xl hover:shadow-2xl transition-all fade-scale';
                card.innerHTML = `
                    <div class="p-5 border-b border-gray-100 flex justify-between items-start gap-2">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 text-xs text-gray-400 font-semibold mb-2">
                                <i class="fas fa-question-circle"></i> Soal ${idx+1}
                                ${isAnswered ? (isCorrectAnswer ? '<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-[10px]"><i class="fas fa-check"></i> Terjawab</span>' : '<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded-full text-[10px]"><i class="fas fa-times"></i> Terjawab</span>') : '<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full text-[10px]">Belum dijawab</span>'}
                            </div>
                            <p class="text-gray-800 font-semibold text-base md:text-lg leading-relaxed">${escapeHtml(q.text)}</p>
                        </div>
                        <div class="text-right">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-r ${isAnswered ? (isCorrectAnswer ? 'from-green-400 to-green-600' : 'from-red-400 to-red-600') : 'from-gray-300 to-gray-400'} text-white text-xs flex items-center justify-center font-bold shadow">
                                ${isAnswered ? (isCorrectAnswer ? '✓' : '✗') : '?'}
                            </div>
                        </div>
                    </div>
                    <div class="p-5 bg-gray-50 flex flex-col sm:flex-row gap-3 justify-between items-center">
                        <div class="flex gap-3 w-full sm:w-auto">
                            <button data-idx="${idx}" data-choice="true" class="option-btn flex-1 sm:flex-none bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold py-2.5 px-6 rounded-xl transition shadow flex items-center justify-center gap-2 ${userChoice === true ? 'ring-2 ring-emerald-500 bg-emerald-200' : ''}">
                                <i class="fas fa-thumbs-up"></i> Benar
                            </button>
                            <button data-idx="${idx}" data-choice="false" class="option-btn flex-1 sm:flex-none bg-rose-100 hover:bg-rose-200 text-rose-800 font-bold py-2.5 px-6 rounded-xl transition shadow flex items-center justify-center gap-2 ${userChoice === false ? 'ring-2 ring-rose-500 bg-rose-200' : ''}">
                                <i class="fas fa-thumbs-down"></i> Salah
                            </button>
                        </div>
                        ${isAnswered ? `<button data-feedback-idx="${idx}" class="show-feedback-btn text-xs text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1"><i class="fas fa-key"></i> Lihat Kunci</button>` : '<span class="text-xs text-gray-400">Pilih jawaban untuk melihat kunci jika salah</span>'}
                    </div>
                    <div id="feedback-${idx}" class="px-5 pb-5 bg-gray-50 hidden transition-all"></div>
                `;
                gridContainer.appendChild(card);
            });
            
            // Attach event listener untuk tombol Benar/Salah (menggunakan event delegation)
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.removeEventListener('click', handleAnswerClick);
                btn.addEventListener('click', handleAnswerClick);
            });
            // Tombol lihat kunci
            document.querySelectorAll('.show-feedback-btn').forEach(btn => {
                btn.removeEventListener('click', handleShowFeedback);
                btn.addEventListener('click', handleShowFeedback);
            });
        }
        
        // Handler menjawab
        function handleAnswerClick(e) {
            const btn = e.currentTarget;
            const idx = parseInt(btn.getAttribute('data-idx'));
            const choiceVal = btn.getAttribute('data-choice'); // "true" atau "false"
            const userChoiceBool = (choiceVal === "true");
            if (isNaN(idx)) return;
            
            // Simpan jawaban
            userAnswers.set(idx, userChoiceBool);
            // Re-render grid untuk update tampilan tombol & feedback bisa ditampilkan lagi (namun kita akan update card spesifik agar efisien)
            // Akan lebih smooth jika update card tersebut tanpa re-render semua. Tapi karena tidak terlalu besar, lakukan render ulang saja.
            renderQuizGrid();
            updateProgressAndScore();
            
            // Tampilkan feedback langsung untuk soal yang baru dijawab (kartu baru sudah ada, tapi feedback masih hidden)
            // maka kita panggil showFeedback untuk soal ini otomatis
            const feedbackDiv = document.getElementById(`feedback-${idx}`);
            if (feedbackDiv) {
                const q = currentQuestions[idx];
                const userAns = userAnswers.get(idx);
                const isCorrect = (userAns === q.correct);
                feedbackDiv.innerHTML = generateFeedbackHTML(q, userAns, isCorrect);
                feedbackDiv.classList.remove('hidden');
                feedbackDiv.classList.add('fade-scale');
            } else {
                // jika belum ada mungkin karena render ulang baru, langsung panggil show via dom
                setTimeout(() => {
                    const fb = document.getElementById(`feedback-${idx}`);
                    if (fb) {
                        const qq = currentQuestions[idx];
                        const ua = userAnswers.get(idx);
                        const ic = (ua === qq.correct);
                        fb.innerHTML = generateFeedbackHTML(qq, ua, ic);
                        fb.classList.remove('hidden');
                    }
                }, 20);
            }
        }
        
        // Menampilkan feedback (manual dari tombol lihat kunci)
        function handleShowFeedback(e) {
            const btn = e.currentTarget;
            const idx = parseInt(btn.getAttribute('data-feedback-idx'));
            if (isNaN(idx)) return;
            const feedbackDiv = document.getElementById(`feedback-${idx}`);
            if (feedbackDiv) {
                const q = currentQuestions[idx];
                const userAns = userAnswers.get(idx);
                if (userAns !== undefined) {
                    const isCorrect = (userAns === q.correct);
                    feedbackDiv.innerHTML = generateFeedbackHTML(q, userAns, isCorrect);
                    feedbackDiv.classList.remove('hidden');
                    feedbackDiv.classList.add('fade-scale');
                } else {
                    feedbackDiv.innerHTML = `<div class="bg-yellow-50 p-3 rounded-xl text-yellow-800 text-sm"><i class="fas fa-info-circle"></i> Belum ada jawaban. Pilih Benar/Salah terlebih dahulu.</div>`;
                    feedbackDiv.classList.remove('hidden');
                }
            }
        }
        
        // Generate HTML feedback (kunci jawaban dan pembahasan)
        function generateFeedbackHTML(question, userChoiceBool, isCorrectLocal) {
            if (!isCorrectLocal) {
                const correctAnswerText = question.correct ? "BENAR" : "SALAH";
                return `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl shadow-md">
                        <div class="flex gap-2 items-start">
                            <i class="fas fa-times-circle text-red-500 text-xl mt-0.5"></i>
                            <div>
                                <p class="font-bold text-red-700">❌ Jawaban Salah</p>
                                <p class="text-sm text-gray-700 mt-1"><span class="font-semibold">🔑 Kunci Jawaban:</span> Pernyataan seharusnya <span class="underline font-bold">${correctAnswerText}</span></p>
                                <div class="bg-white p-2 rounded-lg mt-2 text-sm text-gray-800 border border-red-100">
                                    <i class="fas fa-graduation-cap text-indigo-500 mr-1"></i> <strong>Pembahasan:</strong> ${escapeHtml(question.explanation)}
                                </div>
                                <p class="text-xs text-gray-500 mt-2">📌 Pernyataan: "${escapeHtml(question.text)}"</p>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded-xl shadow-md">
                        <div class="flex gap-2 items-start">
                            <i class="fas fa-check-circle text-green-500 text-xl mt-0.5"></i>
                            <div>
                                <p class="font-bold text-green-700">✅ Jawaban Benar!</p>
                                <p class="text-sm text-gray-700 mt-1">${question.correct ? "Pernyataan ini sesuai fakta." : "Pernyataan ini memang salah, pilihan kamu tepat."}</p>
                                <div class="bg-white p-2 rounded-lg mt-2 text-sm text-gray-800">
                                    <i class="fas fa-info-circle text-blue-500 mr-1"></i> ${escapeHtml(question.explanation)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        // Fungsi reset semua jawaban (tanpa mengacak ulang soal)
        function resetAllAnswers() {
            userAnswers.clear();
            renderQuizGrid();
            updateProgressAndScore();
            // Sembunyikan semua feedback
            document.querySelectorAll('[id^="feedback-"]').forEach(el => {
                el.classList.add('hidden');
                el.innerHTML = '';
            });
            showToast("Semua jawaban direset, skor kembali 0", "bg-indigo-500");
        }
        
        // Acak ulang soal (shuffle ulang)
        function reshuffleQuestions() {
            currentQuestions = shuffleArray([...bankSoal]);
            userAnswers.clear();
            renderQuizGrid();
            updateProgressAndScore();
            showToast("Soal & urutan diacak ulang! Mulai jawab lagi.", "bg-purple-600");
        }
        
        // Toast notifikasi
        function showToast(msg, bgColor = "bg-gray-800") {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-5 py-3 rounded-full shadow-2xl z-50 text-sm font-semibold flex items-center gap-2 backdrop-blur-sm transition-all duration-300`;
            toast.innerHTML = `<i class="fas fa-sync-alt"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Event listeners
        reshuffleBtn?.addEventListener('click', reshuffleQuestions);
        resetBtn?.addEventListener('click', resetAllAnswers);
        
        // Mulai aplikasi
        initRandomQuestions();
    </script>
